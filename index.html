<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura & Diego — Mayo 15, 2027</title>
  <meta name="description" content="Acompáñanos a celebrar nuestra boda el 15 de mayo de 2027 en Oaxaca, México." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Page fade-in ── */
    .page-content {
      opacity: 0;
      transition: opacity .8s ease;
    }
    .page-content.visible { opacity: 1; }
    html.loading { overflow: hidden; }

    /* Preloader — minimal: white screen fades out */
    .preloader {
      position: fixed; inset: 0; z-index: 9999;
      background: #F7F4EF;
      transition: opacity .6s ease, visibility .6s ease;
    }
    .preloader.done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    ::selection { background: rgba(42,42,42,.18); }

    :root {
      --cream: #E8E4DE;
      --cream-light: #F0EDE8;
      --cream-dark: #D5D0C8;
      --charcoal: #2A2A2A;
      --warm-gray: #6B6560;
      --soft-black: #1A1A1A;
      --page-bg: #F9F6F2;
      --headline: #3A2E26;
      --text-muted: #6B5E54;
      --accent: #9A8B5D;
      --placeholder-1: #E8E2D5;
      --placeholder-2: #D9CFC1;
      --placeholder-3: #C4B5A0;
      --font-serif: 'Cormorant Garamond', Garamond, Georgia, serif;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-sans: 'Montserrat', Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: var(--font-sans);
      line-height: 1.6;
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ── Utility ── */
    .label {
      font-family: var(--font-sans);
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--warm-gray);
    }
    .body-text {
      font-family: var(--font-sans);
      font-size: .95rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--warm-gray);
    }
    .divider {
      width: 64px;
      height: 1px;
      background: rgba(42,42,42,.25);
      margin: 0 auto;
    }
    .section {
      padding: clamp(56px, 10vw, 100px) 24px;
    }
    .section-alt { background: var(--cream-light); }
    .container { max-width: 1040px; margin: 0 auto; }
    .container-sm { max-width: 680px; margin: 0 auto; }
    .text-center { text-align: center; }

    .heading-serif {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 300;
      letter-spacing: .06em;
      color: var(--charcoal);
    }
    .heading-display {
      font-family: var(--font-display);
      letter-spacing: .04em;
      color: var(--charcoal);
    }

    /* Section ornament — thin rule only, no icons */
    .section-ornament {
      width: 48px; height: 1px;
      background: rgba(42,42,42,.15);
      margin: 28px auto 0;
    }

    /* ── Scroll Reveal — fade only, no slide ── */
    .reveal {
      opacity: 0;
      transition: opacity 1s ease;
    }
    .reveal.visible {
      opacity: 1;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: rgba(42,42,42,.18); border-radius: 8px; }

    /* ──────────────────────────────────────
       NAVIGATION
    ────────────────────────────────────── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px clamp(24px, 4vw, 48px);
      background: linear-gradient(to bottom, rgba(240,235,225,.7) 0%, rgba(240,235,225,0) 100%);
      transition: background .45s, padding .45s, box-shadow .45s;
    }
    .nav.scrolled {
      background: rgba(232,228,222,.94);
      backdrop-filter: blur(12px);
      padding-top: 16px; padding-bottom: 16px;
      box-shadow: 0 1px 0 rgba(42,42,42,.06);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: .35em;
      color: #1C1C1C;
      transition: color .4s;
    }
    .nav.scrolled .nav-logo { color: var(--charcoal); }

    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      font-family: var(--font-sans);
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(42,42,42,.55);
      transition: color .3s;
    }
    .nav-links a:hover { color: var(--charcoal); }
    .nav.scrolled .nav-links a { color: var(--warm-gray); }
    .nav.scrolled .nav-links a:hover { color: var(--charcoal); }

    .nav-toggle {
      display: none; background: none; border: none; cursor: pointer;
      flex-direction: column; gap: 5px; padding: 4px;
    }
    .nav-toggle span {
      display: block; width: 24px; height: 1px; background: var(--charcoal);
      transition: transform .3s, opacity .3s, background .3s;
    }
    .nav.scrolled .nav-toggle span { background: var(--charcoal); }
    .nav-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(2px,4px); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(2px,-4px); }

    .mobile-menu {
      display: none; position: absolute; top: 100%; left: 0; right: 0;
      background: rgba(232,228,222,.97); backdrop-filter: blur(12px);
      padding: 0; max-height: 0; overflow: hidden;
      transition: max-height .35s, padding .35s;
      border-bottom: 1px solid transparent;
    }
    .mobile-menu.open {
      max-height: 360px; padding: 24px;
      border-bottom: 1px solid rgba(42,42,42,.08);
    }
    .mobile-menu a {
      display: block; padding: 12px 0;
      font-family: var(--font-sans);
      font-size: .7rem; font-weight: 500;
      letter-spacing: .35em; text-transform: uppercase;
      color: var(--warm-gray);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-toggle { display: flex; }
      .mobile-menu { display: block; }
    }

    /* ──────────────────────────────────────
       HERO — flexbox + CSS Grid, zero overlap
    ────────────────────────────────────── */
    .hero {
      min-height: 85vh;
      background: #F9F6F2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14vh 7vw 12vh 7vw;
      gap: 5vw;
    }

    /* Left column: text only */
    .hero-text {
      flex: 0 1 45%;
      max-width: 520px;
    }

    .hero-text h1 {
      font-family: var(--font-serif);
      font-size: clamp(36px, 4vw, 54px);
      color: var(--headline);
      line-height: 1.13;
      font-weight: 300;
      letter-spacing: 0.025em;
      margin: 0 0 2rem 0;
      text-align: left;
      font-variant-ligatures: common-ligatures discretionary-ligatures;
      font-feature-settings: "ss01" on, "ss02" on;
    }

    .hero-divider {
      width: 48px;
      height: 1px;
      background: rgba(42, 42, 42, 0.15);
      margin-bottom: 2rem;
    }

    .hero-info {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(28, 28, 28, 0.32);
      margin-bottom: 2.2rem;
      font-style: italic;
    }

    .hero-text .hero-cta {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      border: none;
      border-bottom: 2px solid var(--accent);
      padding: 0 0 7px 0;
      background: transparent;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s, border-bottom-color 0.3s, padding-bottom 0.3s;
    }

    .hero-text .hero-cta:hover {
      color: var(--headline);
      border-bottom-color: var(--headline);
      padding-bottom: 10px;
    }

    /* Right column: CSS Grid image layout */
    .hero-images {
      flex: 0 1 48%;
      display: grid;
      grid-template-columns: 1fr 0.7fr;
      grid-template-rows: 1.2fr 0.7fr;
      gap: 2.2rem 1.2rem;
      align-items: start;
    }

    /* Portfolio Card Component */
    .portfolio-card {
      background: #FFFFFF;
      border: 1.5px solid rgba(42, 42, 42, 0.12);
      border-radius: 0;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      /* box-shadow removed for a cleaner look */
      overflow: hidden;
      position: relative;
      /* Faint paper texture overlay */
      background-image: url('data:image/svg+xml;utf8,<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="120" height="120" fill="white"/><g opacity=".13"><circle cx="20" cy="20" r="1.2" fill="gray"/><circle cx="60" cy="40" r=".8" fill="gray"/><circle cx="100" cy="80" r="1.1" fill="gray"/><circle cx="80" cy="100" r=".7" fill="gray"/><circle cx="30" cy="90" r=".9" fill="gray"/><circle cx="90" cy="30" r=".7" fill="gray"/></g></svg>');
      background-size: 180px 180px;
      background-blend-mode: multiply;
    }

    .portfolio-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 12% 15%, rgba(255,255,255,0.28), transparent 12%),
                  radial-gradient(circle at 85% 80%, rgba(255,255,255,0.22), transparent 10%);
      opacity: 0.35;
      pointer-events: none;
    }

    .card-image {
      width: 100%;
      height: auto;
      border-radius: 0;
      object-fit: cover;
      display: block;
      filter: sepia(0.1) brightness(0.98) contrast(1.05) saturate(0.9);
      border: none;
      background: #FFFFFF;
    }

    .card-image.portrait { aspect-ratio: 2 / 3; }
    .card-image.landscape { aspect-ratio: 16 / 10; }

    .card-meta {
      border-top: 1px solid rgba(58, 46, 38, 0.12);
      padding-top: 0.8rem;
      min-height: 1.6rem;
      font-family: var(--font-sans);
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(58, 46, 38, 0.8);
      background: rgba(255, 255, 255, 0.9);
    }

    /* Grid placement for cards */
    .portfolio-card:nth-child(1) {
      grid-column: 1 / 2;
      grid-row: 1 / 3;
      z-index: 2;
      padding: 2.2rem 2rem 2.2rem 2.2rem;
    }

    .portfolio-card:nth-child(2) {
      grid-column: 2 / 3;
      grid-row: 1 / 2;
      z-index: 1;
      padding: 1.1rem 1.1rem 1.1rem 1.1rem;
    }

    .portfolio-card:nth-child(3) {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
      z-index: 1;
      padding: 0.8rem 1.1rem 1.1rem 1.1rem;
      margin-top: -1.2rem;
    }

    /* Individual card image backgrounds */
    .portfolio-card:nth-child(1) .card-image,
    .portfolio-card:nth-child(2) .card-image,
    .portfolio-card:nth-child(3) .card-image {
      background: #FFFFFF;
    }

    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        padding: 6vh 5vw;
        gap: 3rem;
        text-align: center;
      }
      .hero-text {
        max-width: 100%;
      }
      .hero-text h1 {
        text-align: center;
      }
      .hero-images {
        width: 100%;
        max-width: 500px;
      }
    }

    @media (max-width: 600px) {
      .hero-images {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .hero-images > div {
        grid-column: 1 / 2 !important;
        aspect-ratio: 16 / 10 !important;
      }
    }

    /* ── Countdown Bar ── */
    .countdown-bar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      background: rgba(232,228,222,.92); backdrop-filter: blur(10px);
      padding: 24px 0;
    }
    .countdown {
      display: flex; justify-content: center; gap: clamp(24px, 5vw, 56px);
    }
    .countdown-unit { text-align: center; }
    @media (max-width: 480px) {
      .countdown-unit.hide-mobile { display: none; }
      .countdown { gap: clamp(28px, 10vw, 48px); }
      .countdown-value { font-size: clamp(2rem, 8vw, 2.8rem); }
    }
    .countdown-value {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 4vw, 3rem);
      font-weight: 300;
      color: var(--charcoal);
      font-variant-numeric: tabular-nums;
    }
    .countdown-label {
      font-family: var(--font-sans);
      font-size: .55rem; font-weight: 500;
      letter-spacing: .35em; text-transform: uppercase;
      color: var(--warm-gray);
      margin-top: 6px;
    }

    /* ──────────────────────────────────────
       OUR STORY
    ────────────────────────────────────── */

    /* Row 1: large title left, prose right */
    .story-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 6vw, 100px);
      align-items: start;
      margin-bottom: clamp(64px, 8vw, 112px);
    }
    @media (max-width: 700px) {
      .story-header { grid-template-columns: 1fr; gap: 32px; }
    }

    .story-title {
      font-family: var(--font-serif);
      font-size: clamp(3.2rem, 8vw, 7rem);
      font-weight: 300;
      line-height: 1.0;
      color: #1C1C1C;
      letter-spacing: -.01em;
    }

    .story-prose {
      padding-top: clamp(0px, 2vw, 24px);
    }
    .story-prose p {
      font-family: var(--font-sans);
      font-size: clamp(.85rem, 1.1vw, .95rem);
      font-weight: 300;
      line-height: 1.85;
      color: rgba(28,28,28,.55);
      margin-bottom: 1.4em;
    }
    .story-prose p:last-child { margin-bottom: 0; }

    /* ── Photo Groups — intercalated, scroll-triggered ── */
    .story-groups {
      display: flex;
      flex-direction: column;
      gap: clamp(80px, 12vw, 160px);
    }

    /* Shared image placeholder */
    .story-img {
      background: #2A2A2A;
      overflow: hidden;
    }

    /* ── Group A: Large portrait left, smaller offset right ── */
    .story-group--a {
      display: grid;
      grid-template-columns: 58% 1fr;
      gap: clamp(14px, 2.5vw, 32px);
      align-items: end;
    }
    .story-group--a .story-img:nth-child(1) {
      aspect-ratio: 3 / 4;
    }
    .story-group--a .story-img:nth-child(2) {
      aspect-ratio: 3 / 4;
      margin-bottom: clamp(32px, 6vw, 80px);
    }

    /* ── Group B: 3 photos — staggered diagonal rhythm ── */
    .story-group--b {
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr;
      gap: clamp(10px, 2vw, 22px);
      align-items: start;
    }
    .story-group--b .story-img:nth-child(1) {
      aspect-ratio: 2 / 3;
      margin-top: clamp(48px, 7vw, 96px);
    }
    .story-group--b .story-img:nth-child(2) {
      aspect-ratio: 3 / 4;
    }
    .story-group--b .story-img:nth-child(3) {
      aspect-ratio: 1 / 1;
      margin-top: clamp(64px, 9vw, 128px);
    }

    /* ── Group C: Mirrored — small landscape left, large portrait right ── */
    .story-group--c {
      display: grid;
      grid-template-columns: 1fr 58%;
      gap: clamp(14px, 2.5vw, 32px);
      align-items: start;
    }
    .story-group--c .story-img:nth-child(1) {
      aspect-ratio: 4 / 5;
      margin-top: clamp(40px, 6vw, 88px);
    }
    .story-group--c .story-img:nth-child(2) {
      aspect-ratio: 3 / 4;
    }

    /* Mobile: simplify groups to 2-column stacks */
    @media (max-width: 700px) {
      .story-groups { gap: clamp(48px, 12vw, 80px); }

      .story-group--a,
      .story-group--c {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
      .story-group--a .story-img:nth-child(2) { margin-bottom: 0; }
      .story-group--c .story-img:nth-child(1) { margin-top: 0; }

      .story-group--b {
        grid-template-columns: 1fr 1fr;
      }
      .story-group--b .story-img:nth-child(1) { margin-top: 0; }
      .story-group--b .story-img:nth-child(3) { display: none; }
    }

    /* ──────────────────────────────────────
       EVENT DETAILS
    ────────────────────────────────────── */
    .date-banner .day {
      font-family: var(--font-serif);
      font-size: clamp(3.5rem, 8vw, 6rem);
      font-weight: 300;
      color: var(--charcoal);
      line-height: 1;
      margin: 4px 0;
    }
    .date-banner .label-day {
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      color: var(--charcoal);
    }

    .cards-grid {
      display: grid; grid-template-columns: 1fr;
      gap: 24px; margin-top: 56px;
    }
    @media (min-width: 640px) { .cards-grid { grid-template-columns: 1fr 1fr; gap: 32px; } }

    .event-card {
      background: var(--cream);
      padding: clamp(32px, 4vw, 48px);
      text-align: center;
      border: 1px solid rgba(42,42,42,.04);
      transition: border-color .4s;
    }
    .event-card:hover { border-color: rgba(42,42,42,.14); }
    .event-card svg { margin: 0 auto 20px; color: rgba(42,42,42,.35); }
    .event-card h3 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: var(--charcoal);
      margin-bottom: 4px;
    }
    .event-card .venue {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--charcoal);
      margin-bottom: 4px;
    }
    .event-card .map-link {
      display: inline-flex; align-items: center; justify-content: center;
      margin-top: 16px;
      min-height: 44px; padding: 10px 0 3px;
      font-size: .6rem; font-weight: 500;
      letter-spacing: .35em; text-transform: uppercase;
      color: var(--warm-gray);
      border-bottom: 1px solid rgba(42,42,42,.25);
      transition: border-color .3s;
    }
    .event-card .map-link:hover { border-color: var(--charcoal); }

    .dress-code {
      max-width: 440px; margin: 56px auto 0;
      background: var(--cream);
      padding: clamp(32px, 4vw, 48px);
      text-align: center;
      border: 1px solid rgba(42,42,42,.04);
    }
    .dress-code h3 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--charcoal);
      margin: 12px 0 8px;
    }

    /* ──────────────────────────────────────
       TRAVEL
    ────────────────────────────────────── */
    .hotel-grid {
      display: grid; grid-template-columns: 1fr;
      gap: 20px; margin-bottom: 72px;
    }
    @media (min-width: 480px) { .hotel-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .hotel-grid { grid-template-columns: repeat(3, 1fr); } }

    .hotel-card {
      background: var(--cream-light);
      padding: 32px;
      border: 1px solid rgba(42,42,42,.04);
      display: flex; flex-direction: column;
      transition: border-color .4s;
    }
    .hotel-card:hover { border-color: rgba(42,42,42,.14); }
    .hotel-card h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: var(--charcoal);
      margin: 12px 0 8px;
    }
    .hotel-card p { flex-grow: 1; }
    .hotel-card .book-link {
      display: inline-flex; align-items: center;
      margin-top: 20px; align-self: flex-start;
      min-height: 44px; padding: 10px 0 3px;
      font-size: .6rem; font-weight: 500;
      letter-spacing: .35em; text-transform: uppercase;
      color: var(--warm-gray);
      border-bottom: 1px solid rgba(42,42,42,.25);
      transition: border-color .3s;
    }
    .hotel-card .book-link:hover { border-color: var(--charcoal); }

    .tips .tip {
      display: flex; gap: 24px; margin-bottom: 36px;
    }
    .tips .tip:last-child { margin-bottom: 0; }
    .tip-line { width: 1px; background: rgba(42,42,42,.1); flex-shrink: 0; }
    .tip h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--charcoal);
      margin-bottom: 6px;
    }

    /* ──────────────────────────────────────
       RSVP
    ────────────────────────────────────── */
    .rsvp-form {
      background: var(--cream);
      padding: clamp(32px, 5vw, 56px);
      border: 1px solid rgba(42,42,42,.04);
    }
    .form-group { margin-bottom: 32px; }
    .form-group label {
      display: block; margin-bottom: 10px;
    }
    .form-input {
      width: 100%;
      background: transparent;
      border: none; border-bottom: 1px solid rgba(42,42,42,.18);
      padding: 12px 0;
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--charcoal);
      outline: none;
      transition: border-color .3s;
    }
    .form-input::placeholder { color: rgba(42,42,42,.2); }
    .form-input:focus { border-color: rgba(42,42,42,.55); }
    textarea.form-input { resize: none; }
    select.form-input { appearance: none; cursor: pointer; }

    .attend-btns { display: flex; gap: 16px; flex-wrap: wrap; }
    .attend-btn {
      flex: 1; min-width: 140px;
      padding: 16px;
      min-height: 52px;
      background: transparent;
      border: 1px solid rgba(42,42,42,.12);
      font-family: var(--font-sans);
      font-size: .8rem;
      letter-spacing: .12em;
      color: var(--warm-gray);
      cursor: pointer;
      transition: all .3s;
    }
    .attend-btn:hover { border-color: rgba(42,42,42,.3); }
    @media (max-width: 380px) {
      .attend-btns { flex-direction: column; }
      .attend-btn { min-width: unset; width: 100%; }
    }
    .attend-btn.selected {
      background: var(--charcoal); color: var(--cream);
      border-color: var(--charcoal);
    }

    .submit-btn {
      width: 100%; padding: 18px;
      background: var(--charcoal); color: var(--cream);
      border: none; cursor: pointer;
      font-family: var(--font-sans);
      font-size: .75rem; font-weight: 500;
      letter-spacing: .35em; text-transform: uppercase;
      transition: background .3s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: var(--soft-black); }

    .thank-you h3 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--charcoal);
      margin-bottom: 12px;
    }

    .extra-fields { display: none; }
    .extra-fields.show {
      display: block;
      animation: fadeUp .5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ──────────────────────────────────────
       FOOTER
    ────────────────────────────────────── */
    .footer {
      background: #1C1C1C;
      color: #F0EBE1;
      padding: clamp(56px, 8vw, 80px) 24px;
      text-align: center;
    }
    .footer h2 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .footer .sub {
      font-size: .65rem; letter-spacing: .5em; text-transform: uppercase;
      opacity: .5;
    }
    .footer .divider-f {
      width: 64px; height: 1px;
      background: rgba(240,235,225,.2);
      margin: 40px auto;
    }
    .footer .quote {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 300;
      font-style: italic;
      opacity: .6;
      max-width: 420px;
      margin: 0 auto 40px;
    }
    .footer .hashtag {
      font-size: .75rem;
      letter-spacing: .35em;
      opacity: .35;
      margin-bottom: 40px;
    }
    .footer .made {
      font-size: .55rem;
      letter-spacing: .15em;
      opacity: .18;
    }

    /* ──────────────────────────────────────
       ACCESSIBILITY — reduced motion
    ────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .hero-enter {
        opacity: 1 !important;
        transform: none !important;
      }
      .oax-float { animation: none !important; }
      .hero-scroll { animation: none !important; }
      .pre-line, .pre-line-bottom,
      .pre-names, .pre-date, .pre-agave,
      .pre-location, .pre-papel, .pre-papel-top,
      .pre-corner { animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>
<body>

<!-- ═══════ PRELOADER ═══════ -->
<div class="preloader" id="preloader">

</div>

<div class="page-content" id="pageContent">

<!-- ═══════ NAVIGATION ═══════ -->
<nav class="nav" id="nav">
  <a href="#inicio" class="nav-logo">L & D</a>
  <ul class="nav-links">
    <li><a href="#inicio">Inicio</a></li>
  </ul>
  <button class="nav-toggle" id="navToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-menu" id="mobileMenu">
    <a href="#inicio">Inicio</a>
  </div>
</nav>
<section class="hero" id="inicio">

  <!-- Left column: text -->
  <div class="hero-text">
    <h1>Laura & Diego te invitan a celebrar el amor, la risa y nuevos comienzos en Oaxaca.</h1>
    <div class="hero-divider"></div>
    <p class="hero-info">Mayo 15, 2027 · Oaxaca, México</p>
    <button class="hero-cta">Confirmar Asistencia</button>
  </div>

  <!-- Right column: CSS Grid portfolio cards -->
  <div class="hero-images">
    <!-- Card 1: Portrait photo -->
    <article class="portfolio-card">
      <img class="card-image portrait" src="photos/photo_1.jpeg" alt="Retrato de boda" />
      <div class="card-meta"></div>
    </article>

    <!-- Card 2: Portrait photo -->
    <article class="portfolio-card">
      <img class="card-image portrait" src="photos/photo_2.jpeg" alt="Momento al aire libre" />
      <div class="card-meta"></div>
    </article>

    <!-- Card 3: Portrait photo -->
    <article class="portfolio-card">
      <img class="card-image portrait" src="photos/photo_3.jpeg" alt="Retrato íntimo" />
      <div class="card-meta"></div>
    </article>
  </div>

</section>

<!-- ═══════ FOOTER ═══════ -->
<footer class="footer">
  <h2>Laura & Diego</h2>
  <p class="sub">Mayo 15, 2027 · Oaxaca, México</p>
  <div class="divider-f"></div>
  <p class="quote">&ldquo;Y en el encontrar, hallamos que el amor siempre estuvo esperando.&rdquo;</p>
  <p class="hashtag">#LauraYDiego2027</p>
  <p class="made">Hecho con amor</p>
</footer>

</div><!-- /page-content -->

<!-- ═══════ JS ═══════ -->
<script>
  /* ── Preloader ── */
  document.documentElement.classList.add('loading');

  window.addEventListener('load', () => {
    // Let the animation play for at least 2.5s
    setTimeout(() => {
      document.getElementById('preloader').classList.add('done');
      document.getElementById('pageContent').classList.add('visible');
      document.documentElement.classList.remove('loading');
    }, 200);
  });

  /* ── Navigation ── */
  const nav = document.getElementById('nav');
  const toggle = document.getElementById('navToggle');
  const mobileMenu = document.getElementById('mobileMenu');

  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 80);
  }, { passive: true });

  toggle.addEventListener('click', () => {
    toggle.classList.toggle('open');
    mobileMenu.classList.toggle('open');
  });

  mobileMenu.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      toggle.classList.remove('open');
      mobileMenu.classList.remove('open');
    });
  });

  /* ── Scroll Reveal ── */
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 80);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

</script>
</body>
</html>
